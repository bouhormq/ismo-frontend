name: Continuous Deployment for Staging branch
on:
  push:
    branches:
      - staging

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v2
        with:
          ref: staging

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Dependencies installation
        run: npm install

      - name: Generate Staging build
        run: npm run build:staging

      - name: Generate deployment package
        run: zip -r ../deploy.zip . -x '*.git*'

      - name: Clean S3 bucket from previous files with the AWS CLI
        if: github.ref == 'refs/heads/staging'
        run: aws s3 rm s3://ismo-website-staging --recursive

      - name: Copy files to the bucket with the AWS CLI
        if: github.ref == 'refs/heads/staging'
        run: aws s3 sync ./dist s3://ismo-website-staging

      - name: Invalidate CloudFront
        uses: chetan/invalidate-cloudfront-action@master
        env:
          PATHS: "/*"
          AWS_REGION: "eu-west-3"
          DISTRIBUTION: ${{ secrets.DISTRIBUTION_STAGING  }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
