name: Continuous Deployment for Main branch
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v2
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 9.6
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Dependencies installation
        run: pnpm install

      - name: Generate production build
        run: pnpm build

      - name: Generate deployment package
        run: zip -r ../deploy.zip . -x '*.git*'

      - name: Clean S3 bucket from previous files with the AWS CLI
        if: github.ref == 'refs/heads/main'
        run: aws s3 rm s3://ismo-website --recursive

      - name: Copy files to the bucket with the AWS CLI
        if: github.ref == 'refs/heads/main'
        run: aws s3 sync ./dist s3://ismo-website

      - name: Invalidate CloudFront
        uses: chetan/invalidate-cloudfront-action@master
        env:
          PATHS: "/*"
          AWS_REGION: "eu-west-3"
          DISTRIBUTION: ${{ secrets.DISTRIBUTION  }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
